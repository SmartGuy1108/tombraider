<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMB QUEST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Cinzel',serif}
#c{display:block;position:fixed;inset:0;width:100%;height:100%}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20}

#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(212,168,48,.8);border-radius:1px}
#xhair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#xhair::after{height:2px;width:100%;top:50%;transform:translateY(-50%)}

#bars{position:absolute;bottom:26px;left:26px}
.brow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.bico{color:#d4a830;font-size:12px;width:14px;text-align:center}
.bwrap{position:relative;width:180px;height:7px;background:rgba(255,255,255,.07);border:1px solid rgba(212,168,48,.2);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .2s}
#hpF{background:linear-gradient(90deg,#a02828,#d84040);width:100%}
#stF{background:linear-gradient(90deg,#1850a8,#3080e0);width:100%}

/* health warning pulse */
@keyframes hpulse{0%,100%{opacity:1}50%{opacity:.4}}
#hpF.low{animation:hpulse .7s infinite}

#relics{position:absolute;bottom:26px;right:26px;text-align:right;color:#d4a830;text-shadow:0 0 14px #d4a83066}
#rN{font-size:36px;font-weight:700;font-family:'Cinzel Decorative',serif;line-height:1}
#rL{font-size:9px;letter-spacing:4px;opacity:.55;margin-top:3px}

#compass{position:absolute;top:20px;right:26px;color:#d4a83077;font-size:10px;letter-spacing:3px}

#msg{
  position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
  color:#d4a830;font-size:17px;letter-spacing:6px;text-align:center;
  text-shadow:0 0 20px #d4a830,0 0 40px #d4a83055;
  opacity:0;transition:opacity .35s;white-space:nowrap;
  font-family:'Cinzel Decorative',serif;pointer-events:none;
}

#minimap{position:absolute;top:18px;left:26px;width:108px;height:108px;
  border:1px solid rgba(212,168,48,.22);border-radius:3px;overflow:hidden}

/* vignette + damage flash */
#vig{position:fixed;inset:0;pointer-events:none;z-index:15;
  background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.72) 100%)}
#dmgFlash{position:fixed;inset:0;pointer-events:none;z-index:16;
  background:rgba(180,0,0,0);transition:background .08s}

/* lock hint */
#hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  color:#d4a83055;font-size:10px;letter-spacing:5px;z-index:18;pointer-events:none;
  transition:opacity .4s}

/* ── MENU ── */
#menu{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(150deg,#080404 0%,#110707 60%,#090505 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .7s;
}
#menu h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(34px,7vw,86px);color:#d4a830;
  letter-spacing:8px;
  text-shadow:0 0 50px #d4a83055,0 0 100px #d4a83022;
  margin-bottom:6px;
}
.sub{font-size:10px;letter-spacing:9px;color:#6a4e18;margin-bottom:50px;text-transform:uppercase}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 46px;margin-bottom:46px}
.crow{font-size:11px;letter-spacing:1px;color:#6a5030}
.crow b{color:#d4a830;font-weight:400}
#enterBtn{
  font-family:'Cinzel',serif;background:none;
  border:1px solid #d4a830;color:#d4a830;
  padding:12px 54px;font-size:12px;letter-spacing:8px;
  cursor:pointer;transition:all .28s;text-transform:uppercase;
}
#enterBtn:hover{background:#d4a83015;box-shadow:0 0 28px #d4a83028}

/* ── DEATH / WIN ── */
#dead,#won{position:fixed;inset:0;z-index:100;display:none;
  flex-direction:column;align-items:center;justify-content:center}
#dead{background:rgba(30,0,0,.93)}
#dead h2{font-family:'Cinzel Decorative',serif;font-size:52px;color:#c02020;
  letter-spacing:8px;text-shadow:0 0 40px #c02020;margin-bottom:26px}
#won{background:rgba(0,12,4,.93)}
#won h2{font-family:'Cinzel Decorative',serif;font-size:42px;color:#d4a830;
  letter-spacing:6px;text-shadow:0 0 40px #d4a830;margin-bottom:10px}
#won p{color:#6a5030;letter-spacing:3px;margin-bottom:34px;font-size:13px}
.rbtn{font-family:'Cinzel',serif;background:none;border:1px solid currentColor;
  padding:10px 42px;font-size:12px;letter-spacing:5px;cursor:pointer;
  transition:all .28s;text-transform:uppercase}
#dead .rbtn{color:#c02020} #dead .rbtn:hover{background:#c0202015}
#won  .rbtn{color:#d4a830} #won  .rbtn:hover{background:#d4a83015}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <canvas id="minimap" width="108" height="108"></canvas>
  <div id="compass">N · 0°</div>
  <div id="xhair"></div>
  <div id="bars">
    <div class="brow"><span class="bico">♥</span><div class="bwrap"><div class="bfill" id="hpF"></div></div></div>
    <div class="brow"><span class="bico">⚡</span><div class="bwrap"><div class="bfill" id="stF"></div></div></div>
  </div>
  <div id="relics"><div id="rN">0</div><div id="rL">RELICS FOUND</div></div>
  <div id="msg"></div>
</div>
<div id="vig"></div>
<div id="dmgFlash"></div>
<div id="hint">CLICK TO LOOK AROUND</div>

<div id="menu">
  <h1>TOMB QUEST</h1>
  <div class="sub">Rise of the Ancient</div>
  <div class="cgrid">
    <div class="crow"><b>W A S D</b> &nbsp;Move</div>
    <div class="crow"><b>Mouse</b> &nbsp;Look</div>
    <div class="crow"><b>Space</b> &nbsp;Jump</div>
    <div class="crow"><b>Shift</b> &nbsp;Sprint</div>
    <div class="crow"><b>Click</b> &nbsp;Lock cursor</div>
    <div class="crow"><b>Esc</b> &nbsp;Unlock</div>
  </div>
  <button id="enterBtn">ENTER THE TOMB</button>
</div>

<div id="dead"><h2>YOU DIED</h2><button class="rbtn" id="retryBtn">TRY AGAIN</button></div>
<div id="won">
  <h2>ANCIENT POWER CLAIMED</h2>
  <p id="wonTxt">All relics recovered.</p>
  <button class="rbtn" id="againBtn">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════════════════
var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.BasicShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.05, 200);
camera.rotation.order = 'YXZ';   // set ONCE and never change

window.addEventListener('resize',function(){
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ═══════════════════════════════════════════════════════════════════
//  POINTER LOCK  —  the ONE place mouse input is handled
// ═══════════════════════════════════════════════════════════════════
var pLocked = false;
var rawDX=0, rawDY=0;   // accumulated between frames

document.addEventListener('pointerlockchange', function(){
  pLocked = document.pointerLockElement === document.getElementById('c');
  document.getElementById('hint').style.opacity = pLocked ? '0' : '1';
});
document.addEventListener('mousemove', function(e){
  if(!pLocked) return;
  rawDX += e.movementX;
  rawDY += e.movementY;
});
// Click anywhere on canvas → request lock (works during gameplay)
document.getElementById('c').addEventListener('click', function(){
  if(G.started) document.getElementById('c').requestPointerLock();
});

// ═══════════════════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════════════════
var K={};
document.addEventListener('keydown',function(e){
  K[e.code]=true;
  if(e.code==='Space'||e.code.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup',function(e){ K[e.code]=false; });

// ═══════════════════════════════════════════════════════════════════
//  GAME STATE  (single object, easy to reset)
// ═══════════════════════════════════════════════════════════════════
var G={
  started:false, alive:true,
  hp:100, maxHp:100,
  stamina:100,
  gems:0, totalGems:0,
  yaw:Math.PI,   // face +Z on spawn
  pitch:0,
  vx:0,vy:0,vz:0,
  onGround:false,
  lastDmg:0,      // timestamp of last damage hit
  hpRegen:0,      // hp regen timer
  bobT:0,
};

// ═══════════════════════════════════════════════════════════════════
//  SCENE LISTS
// ═══════════════════════════════════════════════════════════════════
var COL=[];      // colliders  {x,y,z,hx,hy,hz}
var GEMS=[];     // pickups    {mesh,glow,x,y,z,done}
var TRAPS=[];    // hazards
var TORCHES=[];  // {light,flame,base,ph}
var shadowCount=0;

// ═══════════════════════════════════════════════════════════════════
//  MATERIALS  (recreated each initGame to avoid disposed-texture bugs)
// ═══════════════════════════════════════════════════════════════════
function mkMats(){
  return {
    stone: function(c){ return new THREE.MeshStandardMaterial({color:c||0x4a3f32,roughness:.95,metalness:.04}); },
    gold:  function(){  return new THREE.MeshStandardMaterial({color:0xd4a830,metalness:.88,roughness:.18,emissive:new THREE.Color(0xd4a830),emissiveIntensity:.5}); },
    gem:   function(c){ return new THREE.MeshStandardMaterial({color:c,metalness:1,roughness:0,emissive:new THREE.Color(c),emissiveIntensity:1.2}); },
    wood:  function(){  return new THREE.MeshStandardMaterial({color:0x5a3010,roughness:.9}); },
    metal: function(c){ return new THREE.MeshStandardMaterial({color:c||0x888870,metalness:.85,roughness:.25}); },
  };
}

// ═══════════════════════════════════════════════════════════════════
//  LEVEL HELPERS
// ═══════════════════════════════════════════════════════════════════
var M; // current material set

function addBox(w,h,d,mat,x,y,z,col){
  var mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  mesh.position.set(x,y,z);
  mesh.castShadow=mesh.receiveShadow=true;
  scene.add(mesh);
  if(col) COL.push({x:x,y:y,z:z,hx:w/2,hy:h/2,hz:d/2});
  return mesh;
}
function addCyl(rt,rb,h,seg,mat,x,y,z){
  var m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m;
}
function addTorch(x,y,z,col,shadow){
  col=col||0xff7722;
  var pl=new THREE.PointLight(col,6,22);
  pl.position.set(x,y,z);
  if(shadow && shadowCount<4){
    pl.castShadow=true;
    pl.shadow.mapSize.width=pl.shadow.mapSize.height=256;
    pl.shadow.camera.near=.1; pl.shadow.camera.far=18;
    shadowCount++;
  }
  scene.add(pl);
  addCyl(.05,.07,.52,6,M.wood(),x,y-.5,z);
  var fl=new THREE.Mesh(new THREE.SphereGeometry(.13,8,6),new THREE.MeshBasicMaterial({color:0xffcc44}));
  fl.position.set(x,y,z); scene.add(fl);
  TORCHES.push({light:pl,flame:fl,base:6,ph:Math.random()*6.28});
}
function addGem(x,y,z,col){
  var mesh=new THREE.Mesh(new THREE.OctahedronGeometry(.26,0),M.gem(col));
  mesh.position.set(x,y,z); scene.add(mesh);
  var gl=new THREE.PointLight(col,2,7);
  gl.position.set(x,y,z); scene.add(gl);
  GEMS.push({mesh:mesh,glow:gl,x:x,y:y,z:z,done:false});
  G.totalGems++;
}
function addSpike(x,z,ph){
  var g=new THREE.Group();
  var sm=M.metal(0x9a8888);
  for(var i=-1;i<=1;i++) for(var j=-1;j<=1;j++){
    var c=new THREE.Mesh(new THREE.ConeGeometry(.08,.7,5),sm);
    c.position.set(i*.5,.35,j*.5); g.add(c);
  }
  g.position.set(x,-.55,z); scene.add(g);
  TRAPS.push({type:'spike',mesh:g,x:x,z:z,ph:ph||0});
}
function addPendulum(x,py,z,ph,rad){
  var b=new THREE.Mesh(new THREE.SphereGeometry(.85,12,10),M.stone(0x5a5040));
  b.castShadow=true; scene.add(b);
  var ch=new THREE.Mesh(new THREE.CylinderGeometry(.035,.035,3.5,6),M.metal());
  scene.add(ch);
  TRAPS.push({type:'pend',mesh:b,chain:ch,x:x,py:py,z:z,ph:ph||0,rad:rad||4});
}

// ═══════════════════════════════════════════════════════════════════
//  LEVEL BUILD
// ═══════════════════════════════════════════════════════════════════
function buildLevel(){
  var S1=M.stone(0x4a3f32),S2=M.stone(0x3a3028),S3=M.stone(0x5a5040);
  var S4=M.stone(0x221e14),FL=M.stone(0x5c5040),CE=M.stone(0x181410);
  var G_=M.gold();

  /* ── ROOM 1: Entry Chamber  26×26, centred at 0,0,0 ── */
  addBox(26,.5,26,FL,  0,-.25,0,  true );  // floor
  addBox(26,.4,26,CE,  0, 7.2,0,  false);  // ceiling
  addBox(.6,7.6,26,S1,-13, 3.5,0, true );  // left wall
  addBox(.6,7.6,26,S1, 13, 3.5,0, true );  // right wall
  addBox(26,7.6,.6,S1,  0, 3.5,-13,true);  // back wall
  // front wall — door gap x=(-1.5..1.5), y=(0..5.4)
  addBox(9.5,7.6,.6,S1,-8.75,3.5,13,true);
  addBox(9.5,7.6,.6,S1, 8.75,3.5,13,true);
  addBox(26, 2.2,.6,S1,  0,  6.5,13,true); // lintel

  // pillars
  [[-8,-8],[8,-8],[-8,8],[8,8]].forEach(function(p){
    addBox(1.6,7.6,1.6,S2,p[0],3.5,p[1],true);
    addBox(2.1,.45,2.1,G_,p[0],7.5,p[1],false);
    addBox(2.1,.3, 2.1,G_,p[0],.1, p[1],false);
  });
  // frieze strips on side walls
  for(var fz=-10;fz<=10;fz+=3.5){
    addBox(.15,.5,.5,G_,-12.7,4.5,fz,false);
    addBox(.15,.5,.5,G_, 12.7,4.5,fz,false);
  }
  addBox(6,.4,.15,G_,0,5.6,-12.85,false); // arch carving

  addTorch(-9,4.2,-9,0xff7722,true);
  addTorch( 9,4.2,-9,0xff7722,false);
  addTorch(-9,4.2, 9,0xff7722,false);
  addTorch( 9,4.2, 9,0xff7722,false);

  addGem( 0,1.7,-9, 0x44ffaa);
  addGem(-10,1.7, 0, 0xff5522);

  /* ── CORRIDOR  z 13→40, width 7 ── */
  addBox(7,.5,27,FL, 0,-.25,26.5,true);
  addBox(7,.4,27,CE, 0, 6.2,26.5,false);
  addBox(.6,6.5,27,S1,-3.5,3,26.5,true);
  addBox(.6,6.5,27,S1, 3.5,3,26.5,true);
  // far doorway
  addBox(2.4,6.5,.6,S1,-2.5,3,40,true);
  addBox(2.4,6.5,.6,S1, 2.5,3,40,true);
  addBox(7,1.6,.6,  S1,  0, 5.7,40,true);

  addTorch(-3,4,19,0xff7722,true); addTorch(3,4,19);
  addTorch(-3,4,33);               addTorch(3,4,33);

  // wall sconces
  for(var wz=15;wz<=39;wz+=4.2){
    addBox(.12,.5,.5,G_,-3.2,3.2,wz,false);
    addBox(.12,.5,.5,G_, 3.2,3.2,wz,false);
  }

  // spike gauntlet
  [15.5,18,20.5,23,25.5,28,30.5,33,35.5,38].forEach(function(z,i){
    addSpike(0,z,i*0.55);
  });
  addGem(0,2,22,0xff44aa);
  addGem(0,2,35,0x44aaff);

  /* ── ROOM 2: Grand Chamber  z 40→74, 34 wide ── */
  addBox(34,.5,34,FL, 0,-.25,57,true);
  addBox(34,.4,34,CE, 0, 9.2,57,false);
  addBox(.6,9.6,34,S1,-17,4.5,57,true);
  addBox(.6,9.6,34,S1, 17,4.5,57,true);
  addBox(34,9.6,.6,S1,  0, 4.5,74,true);
  // entry arch from corridor
  addBox(12,9.6,.6,S1,-8,4.5,40,true);
  addBox(12,9.6,.6,S1, 8,4.5,40,true);
  addBox(34,4.0,.6,S1,  0,7.2,40,true);

  // six grand pillars
  [[-11,46],[0,46],[11,46],[-11,65],[0,65],[11,65]].forEach(function(p){
    addBox(2.2,9.6,2.2,S4,p[0],4.5,p[1],true);
    addBox(2.8,.55,2.8,G_,p[0],9.6,p[1],false);
    addBox(2.8,.4, 2.8,G_,p[0],.05,p[1],false);
  });

  addTorch(-14,5.5,44,0xff7722,true); addTorch(14,5.5,44);
  addTorch(-14,5.5,57);               addTorch(14,5.5,57);
  addTorch(-14,5.5,70);               addTorch(14,5.5,70);
  addTorch(  0,  8,57,0xffbb44);      // grand centre
  addTorch(-16,7,52,0xff8833);        addTorch(16,7,52,0xff8833);
  addTorch(-16,7,63,0xff8833);        addTorch(16,7,63,0xff8833);

  // sarcophagi
  [[-10,49],[10,49],[-10,68],[10,68]].forEach(function(p){
    addBox(2,1.1,3.4,S2,p[0],.55,p[1],false);
    addBox(2.1,1.4,3.5,S3,p[0],1.4,p[1],false);
    addBox(2.2,.18,3.6,G_,p[0],2.22,p[1],false);
  });

  // platform puzzle
  addBox(4,.4,4,S3,-7, 2,  57,true);
  addBox(4,.4,4,S3, 0, 3.5,63,true);
  addBox(4,.4,4,S3, 7, 5,  69,true);
  addBox(2,.3,2,S2, 7, 2.8,51,true); // small ledge

  addGem(-7,3.5,57, 0xffdd00);
  addGem( 7,6.5,69, 0xaa44ff);
  addGem( 7,4.2,51, 0x00eeff);

  // pendulums
  addPendulum(-6, 8.5,54, 0.0, 4.0);
  addPendulum( 6, 8.5,54, 1.8, 4.0);
  addPendulum( 0, 8.5,61, 3.5, 4.5);

  // altar
  addBox(8,.6,5, S4,  0,.3,71, true);
  addBox(5,.9,3, G_,  0,.9,71, false);
  addBox(1.5,2,1.5,S2,-3,1,71,false);
  addBox(1.5,2,1.5,S2, 3,1,71,false);
  addBox(5,.12,3,G_,  0,2.1,71,false);
  addTorch(-3.3,3.8,71,0xffee44); addTorch(3.3,3.8,71,0xffee44);
  addGem(0,2.6,71, 0xffffff);

  // east staircase
  for(var si=0;si<8;si++){
    addBox(4,.4,1.5,S2,14,si*.9+.2,43+si*1.8,true);
  }
  addGem(14,7.8,57, 0xff6600);

  /* ── VAULT: west side room x -17→-28, z 48→68 ── */
  addBox(11,.5,20,FL,-22.5,-.25,58,true);
  addBox(11,.4,20,CE,-22.5, 7.2,58,false);
  addBox(.6,7.6,20,S1,-28,3.5,58,true);
  addBox(11,7.6,.6,S1,-22.5,3.5,48,true);
  addBox(11,7.6,.6,S1,-22.5,3.5,68,true);
  // shared wall with gap at z 52–63
  addBox(.6,7.6,4, S1,-17,3.5,50, true);
  addBox(.6,2.0,11,S1,-17,6.25,57.5,true);
  addBox(.6,7.6,5, S1,-17,3.5,65.5,true);

  addTorch(-26,4.5,52,0xff7722,false); addTorch(-26,4.5,64);
  addTorch(-20,5,58,0xffaa33);

  addGem(-22,1.8,52, 0x4488ff);
  addGem(-22,1.8,64, 0xff3355);
  addGem(-26,1.8,58, 0x44ff88);
  addGem(-20,1.8,58, 0xffaa00);

  addSpike(-22,54,1.1); addSpike(-22,62,2.2);

  // chests
  [-24,-22,-20].forEach(function(x){
    addBox(1.4,.8,1, S2,x,.4,66,false);
    addBox(1.45,.38,1.02,S3,x,1.04,66,false);
    addBox(1.5,.06,1.05,G_,x,.84,66,false);
    addBox(1.5,.06,1.05,G_,x,1.26,66,false);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════════════════
var GRAV=-22, JUMP=8, WALK=5.5, RUN=9.5;
var EYE=1.72, RAD=0.38;

function sweepAxis(pos, delta, axis){
  pos[axis] += delta;
  for(var i=0;i<COL.length;i++){
    var c=COL[i];
    var dx=pos.x-c.x, dy=(pos.y-EYE*.5)-c.y, dz=pos.z-c.z;
    var ox=c.hx+RAD     - Math.abs(dx); if(ox<=0) continue;
    var oy=c.hy+EYE*.5  - Math.abs(dy); if(oy<=0) continue;
    var oz=c.hz+RAD     - Math.abs(dz); if(oz<=0) continue;
    if(axis==='x'){ pos.x += dx>0?ox:-ox; G.vx=0; }
    if(axis==='z'){ pos.z += dz>0?oz:-oz; G.vz=0; }
    if(axis==='y'){
      pos.y += dy>0?oy:-oy;
      if(dy>0){G.onGround=true; G.vy=0;}
      else G.vy=0;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════════════════════
function updatePlayer(dt){
  /* ── LOOK: consume raw mouse deltas ── */
  var sens = 0.0020;
  G.yaw   -= rawDX * sens;
  G.pitch -= rawDY * sens;
  G.pitch  = Math.max(-1.28, Math.min(1.28, G.pitch));
  rawDX = rawDY = 0;

  camera.rotation.y = G.yaw;
  camera.rotation.x = G.pitch;

  /* ── MOVE ── */
  var sprinting = (K['ShiftLeft']||K['ShiftRight']) && G.stamina>2;
  G.stamina = sprinting ? Math.max(0,G.stamina-18*dt) : Math.min(100,G.stamina+10*dt);
  var spd = sprinting ? RUN : WALK;

  var sy=Math.sin(G.yaw), cy=Math.cos(G.yaw);
  var mx=0, mz=0;
  if(K['KeyW']||K['ArrowUp'])    { mx-=sy; mz-=cy; }
  if(K['KeyS']||K['ArrowDown'])  { mx+=sy; mz+=cy; }
  if(K['KeyA']||K['ArrowLeft'])  { mx-=cy; mz+=sy; }
  if(K['KeyD']||K['ArrowRight']) { mx+=cy; mz-=sy; }
  var ml=Math.sqrt(mx*mx+mz*mz); if(ml>0){mx/=ml;mz/=ml;}

  G.vx = mx*spd;
  G.vz = mz*spd;
  G.vy += GRAV*dt;
  if(K['Space'] && G.onGround){ G.vy=JUMP; G.onGround=false; }

  /* ── HEAD BOB ── */
  var moving = (mx||mz) && G.onGround;
  G.bobT = moving ? G.bobT+dt*(sprinting?11:6.5) : G.bobT*0.88;
  var bobY = Math.sin(G.bobT)*0.048;

  /* ── COLLIDE & MOVE ── */
  var pos = camera.position;
  G.onGround = false;
  sweepAxis(pos, G.vx*dt, 'x');
  sweepAxis(pos, G.vz*dt, 'z');
  sweepAxis(pos, G.vy*dt, 'y');

  if(pos.y < EYE){ pos.y=EYE; G.vy=0; G.onGround=true; }
  if(pos.y < -10){ doDmg(40,true); spawnPlayer(); }

  camera.position.y = pos.y + (moving ? bobY : 0);

  /* ── HP REGEN: slow regen after 5s out of combat ── */
  var now = performance.now()/1000;
  if(now - G.lastDmg > 5 && G.hp < G.maxHp){
    G.hp = Math.min(G.maxHp, G.hp + 3*dt);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  DAMAGE  —  flat HP values, reasonable cooldown
// ═══════════════════════════════════════════════════════════════════
var dmgEl = document.getElementById('dmgFlash');

function doDmg(amount, bypass){
  // amount = actual HP to remove (not per-frame rate)
  var now = performance.now()/1000;
  var cooldown = bypass ? 0 : 0.8;   // 0.8s between spike hits feels right
  if(now - G.lastDmg < cooldown) return;
  G.lastDmg = now;
  G.hp = Math.max(0, G.hp - amount);

  // visual flash
  dmgEl.style.background = 'rgba(180,0,0,.45)';
  setTimeout(function(){ dmgEl.style.background='rgba(180,0,0,0)'; }, 110);

  // low health warning
  document.getElementById('hpF').classList.toggle('low', G.hp < 30);

  if(G.hp<=0) dieGame();
}

// ═══════════════════════════════════════════════════════════════════
//  TRAPS  —  damage is a flat amount per hit, not per-frame
// ═══════════════════════════════════════════════════════════════════
function updateTraps(t){
  TRAPS.forEach(function(h){
    if(h.type==='spike'){
      var up = Math.sin(t*1.5+h.ph) > .15;
      h.mesh.position.y = up ? .18 : -.65;
      if(up){
        var dx=camera.position.x-h.x, dz=camera.position.z-h.z;
        if(dx*dx+dz*dz < 1.8){
          doDmg(8); // 8 HP per spike hit, ~0.8s cooldown = survive ~12 hits
        }
      }
    } else {
      var ang = Math.sin(t*1.15+h.ph)*1.25;
      var bx  = h.x + Math.sin(ang)*h.rad;
      var by  = h.py - Math.cos(ang)*3.2;
      h.mesh.position.set(bx,by,h.z);
      if(h.chain){
        h.chain.position.set(h.x+Math.sin(ang)*h.rad*.5, h.py-1.8, h.z);
        h.chain.rotation.z = ang*.8;
      }
      var cx=camera.position.x-bx, cy2=camera.position.y-by, cz=camera.position.z-h.z;
      if(cx*cx+cy2*cy2+cz*cz < 2.6){
        doDmg(12); // boulder hit = 12 HP, survive ~8 hits
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  PICKUPS
// ═══════════════════════════════════════════════════════════════════
function updatePickups(t){
  GEMS.forEach(function(p){
    if(p.done) return;
    p.mesh.rotation.y = t*2;
    p.mesh.position.y = p.y + Math.sin(t*2.5)*.1;
    var dx=camera.position.x-p.x, dy=camera.position.y-p.y, dz=camera.position.z-p.z;
    if(dx*dx+dy*dy+dz*dz < 1.8){
      p.done=true; scene.remove(p.mesh); p.glow.intensity=0;
      G.gems++; document.getElementById('rN').textContent=G.gems;
      // small HP reward for collecting
      G.hp=Math.min(G.maxHp, G.hp+5);
      showMsg(p.y>5 ? '✦  HIGH RELIC CLAIMED  ✦' : '✦  RELIC RECOVERED  ✦');
      if(G.gems>=G.totalGems) setTimeout(winGame,1200);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  TORCHES
// ═══════════════════════════════════════════════════════════════════
function updateTorches(t){
  TORCHES.forEach(function(tl){
    tl.light.intensity = tl.base + Math.sin(t*9+tl.ph)*.65 + Math.sin(t*21+tl.ph)*.32;
    tl.flame.scale.setScalar(1+Math.sin(t*14+tl.ph)*.1);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  DUST PARTICLES
// ═══════════════════════════════════════════════════════════════════
var dustAttr=null, dustVel=null, DUST_N=400;
function initDust(){
  var arr=new Float32Array(DUST_N*3);
  dustVel=new Float32Array(DUST_N);
  for(var i=0;i<DUST_N;i++){
    arr[i*3]  =(Math.random()-.5)*80;
    arr[i*3+1]=Math.random()*9;
    arr[i*3+2]=Math.random()*100-10;
    dustVel[i]=.003+Math.random()*.006;
  }
  var geo=new THREE.BufferGeometry();
  dustAttr=new THREE.BufferAttribute(arr,3);
  geo.setAttribute('position',dustAttr);
  var pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xd4a830,size:.07,transparent:true,opacity:.3}));
  scene.add(pts);
}
function updateDust(){
  if(!dustAttr) return;
  var a=dustAttr.array;
  for(var i=0;i<DUST_N;i++){ a[i*3+1]+=dustVel[i]; if(a[i*3+1]>9) a[i*3+1]=0; }
  dustAttr.needsUpdate=true;
}

// ═══════════════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════════════
var mmCtx=document.getElementById('minimap').getContext('2d');
function drawMM(){
  mmCtx.clearRect(0,0,108,108);
  mmCtx.fillStyle='rgba(5,2,4,.9)'; mmCtx.fillRect(0,0,108,108);
  var sc=.92, ox=54-camera.position.x*sc, oy=54-camera.position.z*sc;
  mmCtx.strokeStyle='rgba(212,168,48,.35)'; mmCtx.lineWidth=1;
  // rooms
  [[-13,-13,26,26],[-3.5,13,7,27],[-17,40,34,34],[-28,48,11,20]].forEach(function(r){
    mmCtx.strokeRect(ox+r[0]*sc,oy+r[1]*sc,r[2]*sc,r[3]*sc);
  });
  // gems
  mmCtx.fillStyle='#d4a830';
  GEMS.forEach(function(p){
    if(p.done) return;
    mmCtx.beginPath(); mmCtx.arc(ox+p.x*sc,oy+p.z*sc,2,0,6.283); mmCtx.fill();
  });
  // player dot + direction
  mmCtx.fillStyle='#fff'; mmCtx.beginPath(); mmCtx.arc(54,54,3,0,6.283); mmCtx.fill();
  mmCtx.strokeStyle='#fff'; mmCtx.lineWidth=1.5; mmCtx.beginPath();
  mmCtx.moveTo(54,54);
  mmCtx.lineTo(54-Math.sin(G.yaw)*8, 54-Math.cos(G.yaw)*8);
  mmCtx.stroke();
}

// ═══════════════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('hpF').style.width  = G.hp+'%';
  document.getElementById('stF').style.width  = G.stamina+'%';
  var deg=((G.yaw*180/Math.PI)%360+360)%360;
  var dirs=['N','NE','E','SE','S','SW','W','NW'];
  document.getElementById('compass').textContent = dirs[Math.round(deg/45)%8]+' · '+Math.round(deg)+'°';
}

var msgTimer=null;
function showMsg(txt){
  var el=document.getElementById('msg');
  el.textContent=txt; el.style.opacity=1;
  if(msgTimer) clearTimeout(msgTimer);
  msgTimer=setTimeout(function(){el.style.opacity=0;},2600);
}

// ═══════════════════════════════════════════════════════════════════
//  SPAWN / DIE / WIN
// ═══════════════════════════════════════════════════════════════════
function spawnPlayer(){
  // Centre of Room 1, facing +Z (toward door at z=13)
  camera.position.set(0, EYE, -4);
  G.yaw   = Math.PI;  // yaw=PI → forward direction is +Z
  G.pitch = 0;
  G.vx=G.vy=G.vz=0; G.onGround=true;
  camera.rotation.y = G.yaw;
  camera.rotation.x = 0;
}
function dieGame(){
  G.alive=false;
  document.getElementById('dead').style.display='flex';
  if(document.pointerLockElement) document.exitPointerLock();
}
function winGame(){
  G.alive=false;
  document.getElementById('wonTxt').textContent='You recovered all '+G.totalGems+' relics from the ancient tomb!';
  document.getElementById('won').style.display='flex';
  if(document.pointerLockElement) document.exitPointerLock();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT GAME
// ═══════════════════════════════════════════════════════════════════
function initGame(){
  while(scene.children.length) scene.remove(scene.children[0]);
  COL.length=GEMS.length=TRAPS.length=TORCHES.length=0;
  shadowCount=0; dustAttr=null;

  G.hp=G.maxHp; G.stamina=100; G.gems=0; G.totalGems=0;
  G.alive=true; G.vx=G.vy=G.vz=0; G.onGround=true;
  G.lastDmg=0; G.bobT=0;

  // sky shell
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(120,12,8),
    new THREE.MeshBasicMaterial({color:0x050203,side:THREE.BackSide})
  ));
  scene.fog = new THREE.Fog(0x0d0608,14,58);
  scene.add(new THREE.AmbientLight(0x2a1408, 2.8));
  scene.add(new THREE.HemisphereLight(0x3d1a08, 0x060204, 1.0));

  M = mkMats();
  buildLevel();
  initDust();
  spawnPlayer();

  document.getElementById('rN').textContent='0';
  document.getElementById('dead').style.display='none';
  document.getElementById('won').style.display='none';
  document.getElementById('hpF').classList.remove('low');
}

// ═══════════════════════════════════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════════════════════════════════
document.getElementById('enterBtn').addEventListener('click',function(){
  var menu=document.getElementById('menu');
  menu.style.opacity='0';
  setTimeout(function(){ menu.style.display='none'; },720);
  G.started=true;
  initGame();
  // Request pointer lock after a short delay so the click event doesn't
  // immediately exit it on some browsers
  setTimeout(function(){
    document.getElementById('c').requestPointerLock();
    showMsg('SEEK THE ANCIENT RELICS');
  },750);
});
document.getElementById('retryBtn').addEventListener('click',function(){
  initGame(); G.alive=true;
  document.getElementById('c').requestPointerLock();
  showMsg('SEEK THE ANCIENT RELICS');
});
document.getElementById('againBtn').addEventListener('click',function(){
  initGame(); G.alive=true;
  document.getElementById('c').requestPointerLock();
  showMsg('SEEK THE ANCIENT RELICS');
});

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
var lastT=performance.now();
function loop(){
  requestAnimationFrame(loop);
  var now=performance.now(), dt=Math.min((now-lastT)/1000,.05); lastT=now;
  var t=now/1000;

  if(G.started && G.alive){
    updatePlayer(dt);
    updateTraps(t);
    updatePickups(t);
    updateTorches(t);
    updateDust();
    updateHUD();
    drawMM();
  }
  renderer.render(scene,camera);
}
loop();
</script>
